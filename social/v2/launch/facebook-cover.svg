<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1640 624" width="1640" height="624">
  <defs>
    <radialGradient id="bg-deep" cx="22%" cy="100%" r="120%">
      <stop offset="0%"  stop-color="#091628"/>
      <stop offset="60%" stop-color="#050C18"/>
      <stop offset="100%" stop-color="#04080F"/>
    </radialGradient>
    <radialGradient id="bloom-tr" cx="90%" cy="14%" r="55%">
      <stop offset="0%"  stop-color="#22D3EE" stop-opacity="0.20"/>
      <stop offset="55%" stop-color="#1565C0" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bloom-bl" cx="10%" cy="90%" r="45%">
      <stop offset="0%"  stop-color="#FFBB3C" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#FFBB3C" stop-opacity="0"/>
    </radialGradient>
    <filter id="wm-glow" x="-3%" y="-30%" width="106%" height="160%">
      <feGaussianBlur stdDeviation="10"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
      <feComposite in2="SourceGraphic" operator="over"/>
    </filter>
    <filter id="badge-shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="22"/>
      <feOffset dx="0" dy="22"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.6"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="halo" cx="50%" cy="50%" r="65%">
      <stop offset="0%"  stop-color="#22D3EE" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M 64 0 L 0 0 0 64" fill="none" stroke="#1C2D42" stroke-width="0.5" opacity="0.5"/>
    </pattern>
    <clipPath id="badge-clip">
      <rect x="120" y="160" width="320" height="320" rx="68" ry="68"/>
    </clipPath>
  </defs>

  <rect width="1640" height="624" fill="url(#bg-deep)"/>
  <rect width="1640" height="624" fill="url(#grid)"/>
  <rect width="1640" height="624" fill="url(#bloom-tr)"/>
  <rect width="1640" height="624" fill="url(#bloom-bl)"/>

  <!-- Corner crosshairs -->
  <g stroke="#22D3EE" stroke-width="1" opacity="0.35">
    <line x1="40" y1="40" x2="56" y2="40"/><line x1="40" y1="40" x2="40" y2="56"/>
    <line x1="1584" y1="40" x2="1600" y2="40"/><line x1="1600" y1="40" x2="1600" y2="56"/>
    <line x1="40" y1="568" x2="40" y2="584"/><line x1="40" y1="584" x2="56" y2="584"/>
    <line x1="1600" y1="568" x2="1600" y2="584"/><line x1="1584" y1="584" x2="1600" y2="584"/>
  </g>

  <!-- Spec strip -->
  <text x="80" y="56"
    font-family="'JetBrains Mono','SF Mono',Menlo,monospace"
    font-size="11" letter-spacing="2.5" fill="#22D3EE" opacity="0.6">MATHFLUX_v1.0 · iOS · ANDROID</text>
  <text x="1560" y="56"
    font-family="'JetBrains Mono','SF Mono',Menlo,monospace"
    font-size="11" letter-spacing="2.5" fill="#5C7794" opacity="0.6"
    text-anchor="end">FB_COVER · 1640×624</text>

  <!-- Badge halo + badge -->
  <circle cx="280" cy="320" r="280" fill="url(#halo)"/>
  <g filter="url(#badge-shadow)">
    <rect x="120" y="160" width="320" height="320" rx="68" ry="68" fill="#04080F"/>
    <g clip-path="url(#badge-clip)">
      <g transform="translate(120,160) scale(0.032)">
        <path d="M5402.85 3860.72L5402.85 7125.35L4673.61 9370.36L3178.27 9370.36L5402.85 3860.72Z" fill="white"/>
        <path d="M5402.86 3860.79L5401.09 7125.35L6293.55 9370.36L7788.89 9370.36L5402.86 3860.79Z" fill="white"/>
        <path d="M3957.09 731.785L4704.76 2364.27L1901.01 9370.36L405.675 9370.36L3957.09 731.785Z" fill="white"/>
        <path d="M7103.53 3860.72L5608.19 3860.72L8038.11 9370.36L9533.44 9370.36L7103.53 3860.72Z" fill="#1565C0"/>
        <path d="M4175.16 731.786L9533.44 731.786L9533.44 2364.27L4922.83 2364.27L4175.16 731.786Z" fill="#22D3EE"/>
        <path d="M5608.68 3861.03L9541.65 3863.8L9533.44 5493.22L6328.36 5493.22L5608.68 3861.03Z" fill="#22D3EE"/>
        <path d="M4704.56 2363.97H4922.85L5608.92 3861.03L5402.86 3860.79L4704.56 2363.97Z" fill="#FFBB3C"/>
      </g>
    </g>
    <rect x="120" y="160" width="320" height="320" rx="68" ry="68" fill="none"
      stroke="#22D3EE" stroke-width="1" opacity="0.20"/>
  </g>

  <!-- Eyebrow -->
  <line x1="520" y1="220" x2="556" y2="220" stroke="#22D3EE" stroke-width="2"/>
  <text x="570" y="226"
    font-family="'JetBrains Mono','SF Mono',Menlo,monospace"
    font-size="14" letter-spacing="5" fill="#22D3EE">MATH BATTLES · ANY LEVEL</text>

  <!-- Wordmark glow + solid -->
  <text x="520" y="365"
    font-family="'Helvetica Neue',Helvetica,Arial,sans-serif"
    font-size="160" font-weight="900" letter-spacing="-4"
    opacity="0.4" filter="url(#wm-glow)">
    <tspan fill="#FFFFFF">Math</tspan><tspan fill="#22D3EE">Flux</tspan>
  </text>
  <text x="520" y="365"
    font-family="'Helvetica Neue',Helvetica,Arial,sans-serif"
    font-size="160" font-weight="900" letter-spacing="-4">
    <tspan fill="#FFFFFF">Math</tspan><tspan fill="#22D3EE">Flux</tspan>
  </text>

  <!-- Supporting copy -->
  <text x="520" y="430"
    font-family="'Helvetica Neue',Helvetica,Arial,sans-serif"
    font-size="30" font-weight="500" fill="#C8D8E8" letter-spacing="-.3">Real-time competitive math.</text>
  <text x="520" y="468"
    font-family="'Helvetica Neue',Helvetica,Arial,sans-serif"
    font-size="30" font-weight="500" fill="#5C7794" letter-spacing="-.3">Up to <tspan fill="#FFBB3C" font-weight="700">15 players</tspan>. Any level.</text>

  <!-- Status callouts -->
  <line x1="520" y1="528" x2="556" y2="528" stroke="#FFBB3C" stroke-width="2"/>
  <text x="570" y="534"
    font-family="'JetBrains Mono','SF Mono',Menlo,monospace"
    font-size="13" letter-spacing="3" fill="#FFBB3C">FREE  ·  NO ADS  ·  NO TRACKING</text>
</svg>
