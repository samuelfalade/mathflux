<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <radialGradient id="bg-deep" cx="50%" cy="100%" r="120%">
      <stop offset="0%"  stop-color="#091628"/>
      <stop offset="55%" stop-color="#050C18"/>
      <stop offset="100%" stop-color="#04080F"/>
    </radialGradient>
    <radialGradient id="bloom-tr" cx="90%" cy="8%" r="55%">
      <stop offset="0%"  stop-color="#22D3EE" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bloom-bl" cx="10%" cy="92%" r="50%">
      <stop offset="0%"  stop-color="#FFBB3C" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#FFBB3C" stop-opacity="0"/>
    </radialGradient>
    <filter id="wm-glow" x="-3%" y="-30%" width="106%" height="160%">
      <feGaussianBlur stdDeviation="14"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
      <feComposite in2="SourceGraphic" operator="over"/>
    </filter>
    <filter id="badge-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="30"/>
      <feOffset dx="0" dy="30"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.65"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="halo" cx="50%" cy="50%" r="65%">
      <stop offset="0%"  stop-color="#22D3EE" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#1C2D42" stroke-width="0.5" opacity="0.5"/>
    </pattern>
    <clipPath id="badge-clip">
      <rect x="290" y="380" width="500" height="500" rx="100" ry="100"/>
    </clipPath>
  </defs>

  <rect width="1080" height="1920" fill="url(#bg-deep)"/>
  <rect width="1080" height="1920" fill="url(#grid)"/>
  <rect width="1080" height="1920" fill="url(#bloom-tr)"/>
  <rect width="1080" height="1920" fill="url(#bloom-bl)"/>

  <!-- Corner crosshairs (kept inside Instagram/WhatsApp safe zones — 5% top/bottom) -->
  <g stroke="#22D3EE" stroke-width="2" opacity="0.35">
    <line x1="60" y1="240" x2="84" y2="240"/><line x1="60" y1="240" x2="60" y2="264"/>
    <line x1="996" y1="240" x2="1020" y2="240"/><line x1="1020" y1="240" x2="1020" y2="264"/>
    <line x1="60" y1="1656" x2="60" y2="1680"/><line x1="60" y1="1680" x2="84" y2="1680"/>
    <line x1="1020" y1="1656" x2="1020" y2="1680"/><line x1="996" y1="1680" x2="1020" y2="1680"/>
  </g>

  <!-- Top spec strip -->
  <text x="540" y="290"
    font-family="'JetBrains Mono','SF Mono',Menlo,monospace"
    font-size="20" letter-spacing="6" fill="#22D3EE" opacity="0.75"
    text-anchor="middle">MATHFLUX · v1.0</text>

  <!-- Badge halo -->
  <circle cx="540" cy="630" r="400" fill="url(#halo)"/>

  <!-- Badge -->
  <g filter="url(#badge-shadow)">
    <rect x="290" y="380" width="500" height="500" rx="100" ry="100" fill="#04080F"/>
    <g clip-path="url(#badge-clip)">
      <g transform="translate(290,380) scale(0.05)">
        <path d="M5402.85 3860.72L5402.85 7125.35L4673.61 9370.36L3178.27 9370.36L5402.85 3860.72Z" fill="white"/>
        <path d="M5402.86 3860.79L5401.09 7125.35L6293.55 9370.36L7788.89 9370.36L5402.86 3860.79Z" fill="white"/>
        <path d="M3957.09 731.785L4704.76 2364.27L1901.01 9370.36L405.675 9370.36L3957.09 731.785Z" fill="white"/>
        <path d="M7103.53 3860.72L5608.19 3860.72L8038.11 9370.36L9533.44 9370.36L7103.53 3860.72Z" fill="#1565C0"/>
        <path d="M4175.16 731.786L9533.44 731.786L9533.44 2364.27L4922.83 2364.27L4175.16 731.786Z" fill="#22D3EE"/>
        <path d="M5608.68 3861.03L9541.65 3863.8L9533.44 5493.22L6328.36 5493.22L5608.68 3861.03Z" fill="#22D3EE"/>
        <path d="M4704.56 2363.97H4922.85L5608.92 3861.03L5402.86 3860.79L4704.56 2363.97Z" fill="#FFBB3C"/>
      </g>
    </g>
    <rect x="290" y="380" width="500" height="500" rx="100" ry="100" fill="none"
      stroke="#22D3EE" stroke-width="1.5" opacity="0.20"/>
  </g>

  <!-- Wordmark glow + solid -->
  <text x="540" y="1080"
    font-family="'Helvetica Neue',Helvetica,Arial,sans-serif"
    font-size="148" font-weight="900" letter-spacing="-4"
    text-anchor="middle" opacity="0.4" filter="url(#wm-glow)">
    <tspan fill="#FFFFFF">Math</tspan><tspan fill="#22D3EE">Flux</tspan>
  </text>
  <text x="540" y="1080"
    font-family="'Helvetica Neue',Helvetica,Arial,sans-serif"
    font-size="148" font-weight="900" letter-spacing="-4"
    text-anchor="middle">
    <tspan fill="#FFFFFF">Math</tspan><tspan fill="#22D3EE">Flux</tspan>
  </text>

  <!-- Tagline with centered accent dash above -->
  <line x1="490" y1="1115" x2="590" y2="1115" stroke="#FFBB3C" stroke-width="3"/>
  <text x="540" y="1156"
    font-family="'Helvetica Neue',Helvetica,Arial,sans-serif"
    font-size="22" font-weight="500" letter-spacing="8" fill="#C8D8E8"
    text-anchor="middle">MATH BATTLES · ANY LEVEL</text>

  <!-- Big stats block (story has plenty of vertical room) -->
  <g transform="translate(180, 1290)">
    <!-- Player count card -->
    <rect x="0" y="0" width="340" height="200" rx="20" fill="#0F1B2A" stroke="#1C2D42" stroke-width="1"/>
    <text x="24" y="50"
      font-family="'JetBrains Mono','SF Mono',Menlo,monospace"
      font-size="14" letter-spacing="3" fill="#5C7794">MAX PLAYERS</text>
    <text x="24" y="148"
      font-family="'Helvetica Neue',Helvetica,Arial,sans-serif"
      font-size="118" font-weight="900" fill="#FFFFFF" letter-spacing="-3">15</text>
    <text x="170" y="148"
      font-family="'Helvetica Neue',Helvetica,Arial,sans-serif"
      font-size="38" font-weight="500" fill="#5C7794">/ room</text>

    <!-- Session timer card -->
    <rect x="380" y="0" width="340" height="200" rx="20" fill="#0F1B2A" stroke="#1C2D42" stroke-width="1"/>
    <text x="404" y="50"
      font-family="'JetBrains Mono','SF Mono',Menlo,monospace"
      font-size="14" letter-spacing="3" fill="#5C7794">SESSIONS</text>
    <text x="404" y="148"
      font-family="'Helvetica Neue',Helvetica,Arial,sans-serif"
      font-size="78" font-weight="900" fill="#22D3EE" letter-spacing="-3">60·90·120</text>
    <text x="404" y="184"
      font-family="'JetBrains Mono','SF Mono',Menlo,monospace"
      font-size="14" letter-spacing="3" fill="#5C7794">SECONDS</text>
  </g>

  <!-- Big stats row 2 -->
  <g transform="translate(180, 1530)">
    <!-- Modes card -->
    <rect x="0" y="0" width="340" height="160" rx="20" fill="#0F1B2A" stroke="#1C2D42" stroke-width="1"/>
    <text x="24" y="50"
      font-family="'JetBrains Mono','SF Mono',Menlo,monospace"
      font-size="14" letter-spacing="3" fill="#5C7794">MODES</text>
    <text x="24" y="118"
      font-family="'Helvetica Neue',Helvetica,Arial,sans-serif"
      font-size="64" font-weight="900" fill="#FFFFFF" letter-spacing="-2">Solo</text>
    <text x="180" y="118"
      font-family="'Helvetica Neue',Helvetica,Arial,sans-serif"
      font-size="64" font-weight="900" fill="#5C7794" letter-spacing="-2">·</text>
    <text x="218" y="118"
      font-family="'Helvetica Neue',Helvetica,Arial,sans-serif"
      font-size="48" font-weight="500" fill="#22D3EE" letter-spacing="-1">+2</text>

    <!-- Ads card -->
    <rect x="380" y="0" width="340" height="160" rx="20" fill="#0F1B2A" stroke="#FFBB3C" stroke-width="1"/>
    <text x="404" y="50"
      font-family="'JetBrains Mono','SF Mono',Menlo,monospace"
      font-size="14" letter-spacing="3" fill="#5C7794">ADS · TRACKING</text>
    <text x="404" y="118"
      font-family="'Helvetica Neue',Helvetica,Arial,sans-serif"
      font-size="80" font-weight="900" fill="#FFBB3C" letter-spacing="-3">ZERO</text>
  </g>

  <!-- Bottom CTA -->
  <text x="540" y="1790"
    font-family="'Helvetica Neue',Helvetica,Arial,sans-serif"
    font-size="36" font-weight="700" fill="#FFFFFF"
    text-anchor="middle">Free on iOS &amp; Android</text>
  <line x1="430" y1="1822" x2="650" y2="1822" stroke="#22D3EE" stroke-width="1.5" opacity="0.45"/>
  <text x="540" y="1856"
    font-family="'JetBrains Mono','SF Mono',Menlo,monospace"
    font-size="18" letter-spacing="5" fill="#22D3EE"
    text-anchor="middle">NO ADS  ·  NO TRACKING</text>
</svg>
