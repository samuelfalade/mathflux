<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 500" width="1024" height="500">
  <defs>
    <!-- Background gradient — dark navy with cyan bloom upper-right -->
    <radialGradient id="bg-grad" cx="78%" cy="20%" r="90%">
      <stop offset="0%"  stop-color="#0F2238"/>
      <stop offset="35%" stop-color="#091628"/>
      <stop offset="100%" stop-color="#04080F"/>
    </radialGradient>

    <!-- Cyan accent bloom -->
    <radialGradient id="cyan-bloom" cx="85%" cy="25%" r="40%">
      <stop offset="0%"  stop-color="#22D3EE" stop-opacity="0.22"/>
      <stop offset="45%" stop-color="#22D3EE" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>

    <!-- Wordmark glow -->
    <filter id="flux-glow" x="-3%" y="-30%" width="106%" height="160%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feComposite in="SourceGraphic" in2="b" operator="over"/>
    </filter>

    <!-- Badge drop shadow -->
    <filter id="badge-shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dx="0" dy="14" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.55"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <clipPath id="badge-clip">
      <rect x="64" y="84" width="332" height="332" rx="68" ry="68"/>
    </clipPath>

    <!-- Background mark fragment clipper (for atmospheric repeat) -->
    <clipPath id="fragment-clip">
      <rect width="1024" height="500"/>
    </clipPath>
  </defs>

  <!-- BG layers -->
  <rect width="1024" height="500" fill="url(#bg-grad)"/>
  <rect width="1024" height="500" fill="url(#cyan-bloom)"/>

  <!-- Faint background mark fragments — echoes of the F-bars (large, faded, off-canvas) -->
  <g clip-path="url(#fragment-clip)" opacity="0.04">
    <g transform="translate(720,-80) scale(0.06)">
      <path d="M4175.16 731.786L9533.44 731.786L9533.44 2364.27L4922.83 2364.27L4175.16 731.786Z" fill="#22D3EE"/>
      <path d="M5608.68 3861.03L9541.65 3863.8L9533.44 5493.22L6328.36 5493.22L5608.68 3861.03Z" fill="#22D3EE"/>
      <path d="M7103.53 3860.72L5608.19 3860.72L8038.11 9370.36L9533.44 9370.36L7103.53 3860.72Z" fill="#1565C0"/>
    </g>
  </g>

  <!-- Subtle horizontal accent rule across composition -->
  <line x1="64" y1="250" x2="960" y2="250" stroke="#1C2D42" stroke-width="1" opacity="0.4"/>

  <!-- ── LOGO BADGE (left, 332×332) ── -->
  <g filter="url(#badge-shadow)">
    <rect x="64" y="84" width="332" height="332" rx="68" ry="68" fill="#04080F"/>
    <g clip-path="url(#badge-clip)">
      <g transform="translate(64,84) scale(0.0332)">
        <path d="M5402.85 3860.72L5402.85 7125.35L4673.61 9370.36L3178.27 9370.36L5402.85 3860.72Z" fill="white"/>
        <path d="M5402.86 3860.79L5401.09 7125.35L6293.55 9370.36L7788.89 9370.36L5402.86 3860.79Z" fill="white"/>
        <path d="M3957.09 731.785L4704.76 2364.27L1901.01 9370.36L405.675 9370.36L3957.09 731.785Z" fill="white"/>
        <path d="M7103.53 3860.72L5608.19 3860.72L8038.11 9370.36L9533.44 9370.36L7103.53 3860.72Z" fill="#1565C0"/>
        <path d="M4175.16 731.786L9533.44 731.786L9533.44 2364.27L4922.83 2364.27L4175.16 731.786Z" fill="#22D3EE"/>
        <path d="M5608.68 3861.03L9541.65 3863.8L9533.44 5493.22L6328.36 5493.22L5608.68 3861.03Z" fill="#22D3EE"/>
        <path d="M4704.56 2363.97H4922.85L5608.92 3861.03L5402.86 3860.79L4704.56 2363.97Z" fill="#FFBB3C"/>
      </g>
    </g>
    <rect x="64" y="84" width="332" height="332" rx="68" ry="68" fill="none"
      stroke="#22D3EE" stroke-width="1" opacity="0.20"/>
  </g>

  <!-- ── TYPOGRAPHY BLOCK (right of badge) ── -->

  <!-- Eyebrow label -->
  <text x="448" y="172"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="13" font-weight="500" letter-spacing="6" fill="#22D3EE" opacity="0.85">v1.0 — iOS &amp; ANDROID</text>

  <!-- Wordmark — glow layer -->
  <text x="448" y="270"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="118" font-weight="900" letter-spacing="-3"
    opacity="0.35" filter="url(#flux-glow)">
    <tspan fill="#FFFFFF">Math</tspan><tspan fill="#22D3EE">Flux</tspan>
  </text>
  <!-- Wordmark — solid layer -->
  <text x="448" y="270"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="118" font-weight="900" letter-spacing="-3">
    <tspan fill="#FFFFFF">Math</tspan><tspan fill="#22D3EE">Flux</tspan>
  </text>

  <!-- Tagline -->
  <line x1="448" y1="306" x2="492" y2="306" stroke="#22D3EE" stroke-width="1.5" opacity="0.7"/>
  <text x="504" y="312"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="13" font-weight="500" letter-spacing="4" fill="#5C7794">MATH BATTLES · ANY LEVEL</text>

  <!-- Supporting line -->
  <text x="448" y="368"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="22" font-weight="500" fill="#C8D8E8" letter-spacing="-.3">Real-time competitive math.</text>
  <text x="448" y="400"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="22" font-weight="500" fill="#5C7794" letter-spacing="-.3">Up to 15 players. Any level.</text>

  <!-- Bottom-right corner mark -->
  <text x="960" y="468"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="10" font-weight="500" letter-spacing="3" fill="#5C7794" opacity="0.6"
    text-anchor="end">SAMUEL FALADE</text>
</svg>
