<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 500" width="1024" height="500">
  <defs>
    <radialGradient id="bg-grad" cx="30%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#0F1E33"/>
      <stop offset="60%" stop-color="#070E1C"/>
      <stop offset="100%" stop-color="#04080F"/>
    </radialGradient>
    <radialGradient id="bloom" cx="78%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#22D3EE" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <filter id="flux-glow" x="-5%" y="-40%" width="110%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feComposite in="SourceGraphic" in2="b" operator="over"/>
    </filter>
    <clipPath id="badge">
      <rect x="80" y="130" width="240" height="240" rx="48" ry="48"/>
    </clipPath>
  </defs>

  <!-- Background gradient + bloom on right -->
  <rect width="1024" height="500" fill="url(#bg-grad)"/>
  <rect width="1024" height="500" fill="url(#bloom)"/>

  <!-- Grid texture -->
  <g stroke="#1C2D42" stroke-width="1" opacity="0.35">
    <line x1="0"  y1="50"  x2="1024" y2="50"/>
    <line x1="0"  y1="100" x2="1024" y2="100"/>
    <line x1="0"  y1="150" x2="1024" y2="150"/>
    <line x1="0"  y1="200" x2="1024" y2="200"/>
    <line x1="0"  y1="250" x2="1024" y2="250"/>
    <line x1="0"  y1="300" x2="1024" y2="300"/>
    <line x1="0"  y1="350" x2="1024" y2="350"/>
    <line x1="0"  y1="400" x2="1024" y2="400"/>
    <line x1="0"  y1="450" x2="1024" y2="450"/>
    <line x1="50"  y1="0" x2="50"  y2="500"/>
    <line x1="100" y1="0" x2="100" y2="500"/>
    <line x1="150" y1="0" x2="150" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="250" y1="0" x2="250" y2="500"/>
    <line x1="300" y1="0" x2="300" y2="500"/>
    <line x1="350" y1="0" x2="350" y2="500"/>
    <line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="450" y1="0" x2="450" y2="500"/>
    <line x1="500" y1="0" x2="500" y2="500"/>
    <line x1="550" y1="0" x2="550" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="650" y1="0" x2="650" y2="500"/>
    <line x1="700" y1="0" x2="700" y2="500"/>
    <line x1="750" y1="0" x2="750" y2="500"/>
    <line x1="800" y1="0" x2="800" y2="500"/>
    <line x1="850" y1="0" x2="850" y2="500"/>
    <line x1="900" y1="0" x2="900" y2="500"/>
    <line x1="950" y1="0" x2="950" y2="500"/>
  </g>

  <!-- Logo badge (240×240) at left -->
  <rect x="80" y="130" width="240" height="240" rx="48" ry="48" fill="#04080F"/>
  <g clip-path="url(#badge)">
    <g transform="translate(80,130) scale(0.024)">
      <path d="M5402.85 3860.72L5402.85 7125.35L4673.61 9370.36L3178.27 9370.36L5402.85 3860.72Z" fill="white"/>
      <path d="M5402.86 3860.79L5401.09 7125.35L6293.55 9370.36L7788.89 9370.36L5402.86 3860.79Z" fill="white"/>
      <path d="M3957.09 731.785L4704.76 2364.27L1901.01 9370.36L405.675 9370.36L3957.09 731.785Z" fill="white"/>
      <path d="M7103.53 3860.72L5608.19 3860.72L8038.11 9370.36L9533.44 9370.36L7103.53 3860.72Z" fill="#1565C0"/>
      <path d="M4175.16 731.786L9533.44 731.786L9533.44 2364.27L4922.83 2364.27L4175.16 731.786Z" fill="#22D3EE"/>
      <path d="M5608.68 3861.03L9541.65 3863.8L9533.44 5493.22L6328.36 5493.22L5608.68 3861.03Z" fill="#22D3EE"/>
      <path d="M4704.56 2363.97H4922.85L5608.92 3861.03L5402.86 3860.79L4704.56 2363.97Z" fill="#FFBB3C"/>
    </g>
  </g>
  <rect x="80" y="130" width="240" height="240" rx="48" ry="48" fill="none" stroke="#22D3EE" stroke-width="1.5" opacity="0.18"/>

  <!-- Wordmark + tagline (right of badge) -->
  <text x="370" y="252"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="118" font-weight="900" letter-spacing="-3"
    opacity="0.3" filter="url(#flux-glow)">
    <tspan fill="#FFFFFF">Math</tspan><tspan fill="#22D3EE">Flux</tspan>
  </text>
  <text x="370" y="252"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="118" font-weight="900" letter-spacing="-3">
    <tspan fill="#FFFFFF">Math</tspan><tspan fill="#22D3EE">Flux</tspan>
  </text>

  <line x1="370" y1="278" x2="450" y2="278" stroke="#4A6580" stroke-width="1.5"/>
  <text x="464" y="284"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="13" font-weight="500" letter-spacing="5" fill="#4A6580">MATH BATTLES · ANY LEVEL</text>
  <line x1="752" y1="278" x2="832" y2="278" stroke="#4A6580" stroke-width="1.5"/>

  <text x="370" y="330"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="22" font-weight="500" fill="#C8D8E8">Real-time competitive math · up to 15 players</text>

  <!-- Platform badges -->
  <g transform="translate(370, 360)">
    <rect x="0" y="0" width="120" height="34" rx="8" fill="#0F1B2A" stroke="#22D3EE" stroke-width="1" opacity="0.9"/>
    <text x="14" y="22" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="2" fill="#22D3EE">iOS · ANDROID</text>
  </g>
  <g transform="translate(502, 360)">
    <rect x="0" y="0" width="120" height="34" rx="8" fill="#0F1B2A" stroke="#FFBB3C" stroke-width="1" opacity="0.9"/>
    <text x="20" y="22" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="2" fill="#FFBB3C">15 PLAYERS</text>
  </g>
  <g transform="translate(634, 360)">
    <rect x="0" y="0" width="120" height="34" rx="8" fill="#0F1B2A" stroke="#1565C0" stroke-width="1" opacity="0.9"/>
    <text x="20" y="22" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="2" fill="#7DD3FC">REAL-TIME</text>
  </g>
</svg>
